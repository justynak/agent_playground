name: EU AI Act News checks

on:
  push:
    paths:
      - "eu_ai_act_news/**"
  pull_request:
    paths:
      - "eu_ai_act_news/**"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eu_ai_act_news

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint

      - name: Test
        run: make test
