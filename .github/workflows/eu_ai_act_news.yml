name: EU AI Act News Digest

on:
  schedule:
    - cron: "0 8 * * *"   # 8:00 AM UTC every day
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  issues: write

jobs:
  news-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: eu_ai_act_news/requirements.txt

      - name: Install dependencies
        run: pip install -r eu_ai_act_news/requirements.txt

      - name: Run news eu_ai_act_news
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python eu_ai_act_news/news_eu_ai_act_news.py
